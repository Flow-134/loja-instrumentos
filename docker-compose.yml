services:
  app:
    build:
      context: .
      dockerfile: docker/dockerfile
    container_name: loja_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - composer_cache:/root/.composer
    environment:
      APP_ENV: local
      APP_DEBUG: true
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: loja_instrumentos
      DB_USERNAME: root
      DB_PASSWORD: ""
    depends_on:
      - mysql
    networks:
      - laravel_network

  nginx:
    image: nginx:alpine
    container_name: loja_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel_network

  mysql:
    image: mysql:8.4
    container_name: loja_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: loja_instrumentos
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - laravel_network

volumes:
  mysql_data:
  composer_cache:

networks:
  laravel_network:
    driver: bridge